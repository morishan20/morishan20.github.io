
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go2travelplanner - Home</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

<!--  NAVIGATION BAR 
       <nav> is the HTML tag for navigation.
       It contains the logo on the left and the
       links on the right. -->

  <nav class="navbar">

    <a href="index.html" class="navbar-logo">
      <!-- Compass icon using a Unicode character -->
      <span style="font-size: 1.3rem;">⊙</span>
      Go2travelplanner
    </a>


    <ul class="navbar-links">

      <li><a href="index.html" class="active">Home</a></li>

      <li><a href="cities.html">Cities</a></li>
      <li><a href="daily-activities.html">Daily Activities</a></li>
      <li><a href="my-trips.html">My Trips</a></li>
      <li><a href="login.html">Login</a></li>

  
      <li>
        <button class="dark-toggle" id="darkToggleBtn" onclick="toggleDarkMode()">🌙</button>
      </li>

    </ul>

  </nav>

<!--  HERO SECTION
       
       The big banner at the top of the page.
       class="hero" connects it to our CSS.-->
       
  <section class="hero">

    <!-- Compass icon above the heading -->
    <div class="hero-icon">
      <span style="font-size: 3rem;">⊙</span>
    </div>

    <!-- Main heading -->
    <h1>Plan Your Dream Journey</h1>

    <!-- Subheading paragraph -->
    <p>
      Discover amazing destinations, organize your daily activities, and
      create unforgettable travel experiences with our intuitive trip planner.
    </p>

    <!-- Two buttons side by side -->
    <!-- We wrap each button in an <a> tag so clicking  -->
    <!-- the button also navigates to another page       -->
    <div class="hero-buttons">

      <!-- Primary button - links to cities page -->
      <a href="cities.html">
        <button class="btn-teal">Start Exploring →</button>
      </a>

      <!-- Secondary button - links to my trips page -->
      <a href="my-trips.html">
        <button class="btn-outline">My Trips</button>
      </a>

    </div>

  </section>


  <!-- MORE SECTIONS WILL GO HERE -->
  


  <!--     JAVASCRIPT
    Loads our darkmode.js file from the js/ folder -->

  <script src="js/darkmode.js"></script>

</body>
</html>
